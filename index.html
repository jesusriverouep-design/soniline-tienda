<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SONILINE - Car Audio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo-titulo.png">
</head>
<body>

    <div class="theme-switch" id="theme-toggle"><span id="theme-icon">🌙</span></div>

    <header class="main-header">
        <img src="logo-principal.png" alt="SONILINE" class="main-logo">
    </header>

    <nav class="categories-nav" id="nav-categorias"></nav>

    <main class="container">
        <h2 id="category-title">CATALOGO COMPLETO</h2> 

        <div class="search-bar" style="padding: 10px 20px;">
            <input type="text" id="inputBusqueda" placeholder="Buscar modelo, marca o producto..." 
                    style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--borde); background: var(--bg-tarjeta); color: var(--texto-principal);">
        </div>
        <div class="productos-grid" id="productos-grid"></div>
    </main>

    <a href="https://wa.me/584247681211?text=Hola%20Soniline%20necesito%20informacion%20sobre%20un%20producto" class="whatsapp-float" target="_blank">
        <span class="wa-icon"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA"></span>
    </a>

    <div class="cart-float" onclick="abrirModalCarrito()">
        <span>🛒</span>
        <span id="cart-count">0</span>
    </div>

    <div id="modal-carrito" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="cerrarModal()">✕</button>
            <h3>Tu Carrito</h3>
            <div id="lista-carrito"></div>
            <p class="total-p">TOTAL: $ <span id="precio-total">0.00</span></p> 
            <button class="btn-enviar-total" onclick="enviarWhatsApp()">ENVIAR A WHATSAPP</button>
        </div>
    </div>

    <div id="modal-confirmacion" class="modal">
        <div class="modal-content" style="text-align:center">
            <div style="font-size:40px; color:#25d366">✔</div>
            <p><strong id="detalle-confirmacion"></strong> agregado con exito.</p>
            <button class="btn-add" onclick="cerrarModal()">ACEPTAR</button>
        </div>
    </div>

    <script src="categorias.js"></script>
    <script src="productos.js"></script>
    <script src="app.js"></script>

    <button id="btnTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" 
        style="display:none; position:fixed; bottom:85px; right:20px; z-index:99; 
               background:#1d4db5; color:white; border:none; width:45px; height:45px; 
               border-radius:50%; font-size:20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor:pointer;">
        ↑
    </button>


   <div id="modal-detalles" class="modal" style="display:none;">
    <div class="modal-content detalle-pro">
        <button class="close-modal" onclick="cerrarModal('modal-detalles')">✕</button>
        
        <div class="detalle-flex-layout">
            <div class="detalle-galeria-seccion">
                <div id="slider-wrapper">
                    </div>
                    
                    <div id="puntos-slider" style="position: absolute; bottom: 10px; width: 100%; display: flex; justify-content: center; gap: 5px; z-index: 20;">
                        </div>

                <button onclick="moverSlider(-1)" class="btn-slider prev">❮</button>
                <button onclick="moverSlider(1)" class="btn-slider next">❯</button>
            </div>

            <div class="detalle-info-seccion">
                <div class="detalles-meta-wrapper">
                <span id="detalles-marca"></span>
                <span id="detalles-modelo"></span> 
            </div>

            <h2 id="detalles-nombre"></h2>
            <p id="detalles-precio"></p>
                
                <div class="specs-container">
                    <h4>ESPECIFICACIONES TÉCNICAS</h4>
                    <div id="detalles-specs"></div>
                </div>

                <button id="btn-agregar-detalles" class="btn-add-grande">
                    AÑADIR AL CARRITO
                </button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
